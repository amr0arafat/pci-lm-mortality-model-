<svg viewBox="0 0 1020 1300" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-labelledby="ttl desc"><title id="ttl">Analysis pipeline</title><desc id="desc">Flowchart of the machine-learning pipeline from the Gulf-LM registry data through model selection, calibration, explainability and deployment.</desc><rect x="0" y="0" width="1020" height="1216" fill="#ffffff"/><defs><marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#5b6b7a"/></marker></defs><text x="510.0" y="46" text-anchor="middle" font-size="26" font-weight="700" fill="#1f2d3d">Machine-learning analysis pipeline</text><text x="510.0" y="72" text-anchor="middle" font-size="14.5" fill="#5b6b7a">In-hospital mortality after PCI for unprotected left main disease &#8212; Gulf-LM registry</text><rect x="160.0" y="98" width="700" height="86" rx="12" fill="#f4f7fa" stroke="#9fb2c4" stroke-width="1.6"/><circle cx="186.0" cy="124" r="14" fill="#9fb2c4"/><text x="186.0" y="129" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">1</text><text x="212.0" y="129" font-size="16" font-weight="700" fill="#1f2d3d">Data source</text><text x="212.0" y="150" font-size="12.5" fill="#5b6b7a">Gulf-LM registry · 1,205 patients · 45 deaths (3.7%) · no missing data</text><rect x="160.0" y="218" width="700" height="104" rx="12" fill="#eaf1f8" stroke="#2e6fb0" stroke-width="1.6"/><circle cx="186.0" cy="244" r="14" fill="#2e6fb0"/><text x="186.0" y="249" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">2</text><text x="212.0" y="249" font-size="16" font-weight="700" fill="#1f2d3d">Feature set &amp; leakage control</text><text x="212.0" y="270" font-size="12.5" fill="#5b6b7a">24 baseline predictors: 22 binary + EuroSCORE II &amp; SYNTAX (continuous)</text><text x="212.0" y="289" font-size="12.5" fill="#5b6b7a">Post-procedure / outcome columns excluded to prevent target leakage</text><rect x="160.0" y="356" width="700" height="104" rx="12" fill="#eaf1f8" stroke="#2e6fb0" stroke-width="1.6"/><circle cx="186.0" cy="382" r="14" fill="#2e6fb0"/><text x="186.0" y="387" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">3</text><text x="212.0" y="387" font-size="16" font-weight="700" fill="#1f2d3d">Preprocessing &amp; imbalance handling</text><text x="212.0" y="408" font-size="12.5" fill="#5b6b7a">Continuous variables standardized (in-fold)</text><text x="212.0" y="427" font-size="12.5" fill="#5b6b7a">Natural class distribution: no oversampling or class weighting (preserves calibration)</text><rect x="160.0" y="494" width="700" height="104" rx="12" fill="#f4f7fa" stroke="#9fb2c4" stroke-width="1.6"/><circle cx="186.0" cy="520" r="14" fill="#9fb2c4"/><text x="186.0" y="525" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">4</text><text x="212.0" y="525" font-size="16" font-weight="700" fill="#1f2d3d">Model library</text><text x="212.0" y="546" font-size="12.5" fill="#5b6b7a">14 ML algorithms: RF, extra trees, penalized logistic (L2 &amp; elastic-net), SVM, KNN,</text><text x="212.0" y="565" font-size="12.5" fill="#5b6b7a">naive Bayes, AdaBoost, gradient boosting, XGBoost, LightGBM, CatBoost, decision tree</text><rect x="160.0" y="632" width="700" height="104" rx="12" fill="#f4f7fa" stroke="#9fb2c4" stroke-width="1.6"/><circle cx="186.0" cy="658" r="14" fill="#9fb2c4"/><text x="186.0" y="663" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">5</text><text x="212.0" y="663" font-size="16" font-weight="700" fill="#1f2d3d">Repeated stratified cross-validation</text><text x="212.0" y="684" font-size="12.5" fill="#5b6b7a">5-fold stratified CV × 20 repeats = 100 held-out evaluations per model</text><text x="212.0" y="703" font-size="12.5" fill="#5b6b7a">Metrics: AUROC, AUPRC (average precision), Brier score</text><rect x="160.0" y="776" width="700" height="86" rx="12" fill="#fbece9" stroke="#c0392b" stroke-width="1.6"/><circle cx="186.0" cy="802" r="14" fill="#c0392b"/><text x="186.0" y="807" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">6</text><text x="212.0" y="807" font-size="16" font-weight="700" fill="#1f2d3d">Best model — Random Forest</text><text x="212.0" y="828" font-size="12.5" fill="#5b6b7a">AUROC 0.904 (0.856–0.940) · AUPRC 0.353 · well calibrated · vs EuroSCORE II 0.82</text><line x1="510.0" y1="184" x2="510.0" y2="216" stroke="#5b6b7a" stroke-width="2" marker-end="url(#ar)"/><line x1="510.0" y1="322" x2="510.0" y2="354" stroke="#5b6b7a" stroke-width="2" marker-end="url(#ar)"/><line x1="510.0" y1="460" x2="510.0" y2="492" stroke="#5b6b7a" stroke-width="2" marker-end="url(#ar)"/><line x1="510.0" y1="598" x2="510.0" y2="630" stroke="#5b6b7a" stroke-width="2" marker-end="url(#ar)"/><line x1="510.0" y1="736" x2="510.0" y2="774" stroke="#5b6b7a" stroke-width="2" marker-end="url(#ar)"/><line x1="510.0" y1="862" x2="510.0" y2="878" stroke="#5b6b7a" stroke-width="2"/><path d="M510.0,878 L349.0,878 L349.0,900" fill="none" stroke="#5b6b7a" stroke-width="2" marker-end="url(#ar)"/><path d="M510.0,878 L671.0,878 L671.0,900" fill="none" stroke="#5b6b7a" stroke-width="2" marker-end="url(#ar)"/><rect x="200.0" y="902" width="298" height="104" rx="12" fill="#f4f7fa" stroke="#9fb2c4" stroke-width="1.6"/><circle cx="226.0" cy="928" r="14" fill="#9fb2c4"/><text x="226.0" y="933" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">7</text><text x="252.0" y="933" font-size="15" font-weight="700" fill="#1f2d3d">Calibration &amp; thresholds</text><text x="252.0" y="954" font-size="12.5" fill="#5b6b7a">Well calibrated (CITL ≈ 0)</text><text x="252.0" y="973" font-size="12.5" fill="#5b6b7a">Youden &amp; high-sensitivity</text><text x="252.0" y="992" font-size="12.5" fill="#5b6b7a">operating points</text><rect x="522.0" y="902" width="298" height="104" rx="12" fill="#f4f7fa" stroke="#9fb2c4" stroke-width="1.6"/><circle cx="548.0" cy="928" r="14" fill="#9fb2c4"/><text x="548.0" y="933" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">8</text><text x="574.0" y="933" font-size="15" font-weight="700" fill="#1f2d3d">Explainability (SHAP)</text><text x="574.0" y="954" font-size="12.5" fill="#5b6b7a">Global &amp; local attributions</text><text x="574.0" y="973" font-size="12.5" fill="#5b6b7a">Top: EuroSCORE II, STEMI,</text><text x="574.0" y="992" font-size="12.5" fill="#5b6b7a">shock, tachy., SYNTAX</text><path d="M349.0,1006 L349.0,1022 L510.0,1022" fill="none" stroke="#5b6b7a" stroke-width="2"/><path d="M671.0,1006 L671.0,1022 L510.0,1022" fill="none" stroke="#5b6b7a" stroke-width="2"/><line x1="510.0" y1="1022" x2="510.0" y2="1044" stroke="#5b6b7a" stroke-width="2" marker-end="url(#ar)"/><rect x="160.0" y="1046" width="700" height="104" rx="12" fill="#e6f5ec" stroke="#1e8b53" stroke-width="1.6"/><circle cx="186.0" cy="1072" r="14" fill="#1e8b53"/><text x="186.0" y="1077" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">9</text><text x="212.0" y="1077" font-size="16" font-weight="700" fill="#1f2d3d">Deployment of best model</text><text x="212.0" y="1098" font-size="12.5" fill="#5b6b7a">Calibrated model (.pkl) · CSV scoring CLI</text><text x="212.0" y="1117" font-size="12.5" fill="#5b6b7a">Streamlit app · self-contained offline HTML risk calculator</text><rect x="160.0" y="1176" width="16" height="16" rx="3" fill="#eaf1f8" stroke="#2e6fb0" stroke-width="1.4"/><text x="184.0" y="1189" font-size="12.5" fill="#5b6b7a">data preparation</text><rect x="330.0" y="1176" width="16" height="16" rx="3" fill="#fbece9" stroke="#c0392b" stroke-width="1.4"/><text x="354.0" y="1189" font-size="12.5" fill="#5b6b7a">selected model</text><rect x="490.0" y="1176" width="16" height="16" rx="3" fill="#e6f5ec" stroke="#1e8b53" stroke-width="1.4"/><text x="514.0" y="1189" font-size="12.5" fill="#5b6b7a">deployment</text></svg>